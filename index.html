<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Cache Busting Requirements -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Fresh & Crisp Cafe</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Stylesheet with Cache Busting -->
  <link rel="stylesheet" href="styles.css?v=frsh3">
</head>
<body>
  <div class="container">

    <!-- Left / Top: Featured Item -->
    <div class="featured-section">
      <div id="image-container">
        <!-- Image layers injected here via JS for crossfading Ken Burns effect -->
      </div>

      <div class="badge" id="fresh-badge">Fresh Today</div>

      <div class="featured-overlay">
        <div id="text-overlay">
          <h2 class="featured-title" id="featured-title"></h2>
          <p class="featured-desc" id="featured-desc"></p>
        </div>
      </div>
    </div>

    <!-- Right / Bottom: Menu -->
    <div class="menu-section">
      <header class="menu-header">
        <h1>Fresh & Crisp</h1>
        <p>Modern Cafe</p>
      </header>

      <div class="menu-categories" id="menu-categories">
        <!-- Categories and items injected via JS -->
      </div>
    </div>

  </div>

  <!-- Script with Cache Busting -->
  <script src="script.js?v=frsh3"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
